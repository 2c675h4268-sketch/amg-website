<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks — The Atomic Brief</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700,800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #fafaf8; color: #18181b; padding: 24px;
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card { max-width: 460px; width: 100%; text-align: center; }
    .logo { width: 46px; height: 46px; border-radius: 12px; display: block; margin: 0 auto 26px; }
    .emoji { font-size: 46px; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 27px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 12px; }
    p { font-size: 16px; line-height: 1.6; color: #52525b; margin: 0; }
    .sub { font-size: 13px; color: #a1a1aa; margin-top: 28px; line-height: 1.7; }
    .sub a { color: #2563eb; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/amg-logo.webp" alt="Atomic Media Group" />
    <div class="emoji" id="emoji">🙏</div>
    <h1 id="title">Thanks for the feedback!</h1>
    <p id="msg">Every bit helps us make The Atomic Brief sharper each Sunday.</p>
    <p class="sub">You can close this tab — see you next Sunday.<br /><a href="https://atomicmediagroup.ai">atomicmediagroup.ai</a></p>
  </div>
  <script>
    (function () {
      var SUPABASE_URL = 'https://qybwjkyifdroktiriaqt.supabase.co';
      var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5Yndqa3lpZmRyb2t0aXJpYXF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTUzNzYsImV4cCI6MjA5NjA5MTM3Nn0.JJFqoCugHoe6fsah3kEjk8ezZZ4kTVzcfu_AQ7x-lg8';
      var fb = new URLSearchParams(location.search).get('fb');
      if (fb === 'yes' || fb === 'no') {
        try {
          fetch(SUPABASE_URL + '/rest/v1/feedback', {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
            body: JSON.stringify({ vote: fb, source: 'newsletter' })
          }).catch(function () {});
        } catch (e) {}
        if (fb === 'no') {
          document.getElementById('emoji').textContent = '🙏';
          document.getElementById('msg').textContent = 'Thanks for the honesty — we’ll keep working to make it better.';
        }
      }
    })();
  </script>
</body>
</html>
