;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">What Happened</p><p style="margin:0;font-size:16px;line-height:1.6;color:rgba(255,255,255,0.82);">After a June 12 IPO that briefly made Elon Musk the world&#39;s first trillionaire and pushed SpaceX past Amazon, shares slid roughly 16% Monday, erasing around $600 billion before stabilizing near $156. Musk&#39;s net worth fell to about $957 billion.</p><p style="margin:12px 0 0;font-size:16px;line-height:1.65;color:rgba(255,255,255,0.78);">SpaceX raised billions in new debt while cutting interest costs, tested its Starfall cargo reentry vehicle, and Firefly neared a $110 million EXIM loan.</p></td></tr><tr><td style="padding:20px 32px 18px;border-bottom:1px solid rgba(255,255,255,0.08);"><p style="margin:0 0 8px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">Why It Matters</p><p style="margin:0;font-size:16px;line-height:1.6;color:rgba(255,255,255,0.82);">The correction proves public markets will not extend SpaceX the unlimited valuation patience it enjoyed while private, forcing discipline on a company that just loaded up on debt during a global tech selloff. Government capital is now flowing to rivals, with Firefly&#39;s EXIM loan and India&#39;s PSLV technology transfer widening the field beyond Musk.</p><p style="margin:12px 0 0;font-size:16px;line-height:1.65;color:rgba(255,255,255,0.78);">Expect commercial space to fragment into a contest of state-backed competitors rather than a single dominant player.</p></td></tr><tr><td style="padding:20px 32px 26px;"><p style="margin:0 0 12px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">Watch: Next 90 Days</p><table cellpadding="0" cellspacing="0" border="0" width="100%"><tr><td style="padding-bottom:10px;vertical-align:top;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:8px;padding-top:7px;vertic it:cover;display:block;border-radius:0 13px 13px 0;" /></td></tr></table></td></tr><tr><td style="padding:0;"><table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#064e3b" style="background-color:#064e3b;background-image:linear-gradient(135deg,#022c22 0%,#064e3b 50%,#065f46 100%);"><tr><td style="padding:26px 32px 16px;border-bottom:1px solid rgba(255,255,255,0.08);"><p style="margin:0 0 4px;font-size:14px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.66);">Longevity &amp;nbsp;&amp;middot;&amp;nbsp; Weekly Analysis</p><p style="margin:0;font-size:19px;font-weight:700;letter-spacing:-0.02em;color:#ffffff;">What this week means for where longevity is headed.</p></td></tr><tr><td style="padding:20px 32px 18px;border-bottom:1px solid rgba(255,255,255,0.08);"><p style="margin:0 0 8px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">What Happened</p><p style="margin:0;font-size:16px;line-height:1.6;color:rgba(255,255,255,0.82);">uniQure priced an upsized $225 million Nasdaq offering, while Elicio Therapeutics fell about 73% after its pancreatic cancer therapy missed a mid-stage endpoint, with roughly $15 million in cash through Q4 2026. A Delaware jury ordered Amgen&#39;s Teneobio to pay Harbour Antibodies $20.2 million for patent infringement.</p><p style="margin:12px 0 0;font-size:16px;line-height:1.65;color:rgba(255,255,255,0.78);">Argentina repealed biotech patent restrictions, and Nvidia pitched agentic AI for drug discovery at Bio International.</p></td></tr><tr><td style="padding:20px 32px 18px;border-bottom:1px solid rgba(255,255,255,0.08);"><p style="margin:0 0 8px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">Why It Matters</p><p style="margin:0;font-size:16px;line-height:1.6;color:rgba(255,255,255,0.82);">Capital is flowing decisively to validated platforms like gene therapy while yle="padding-bottom:10px;vertical-align:top;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:8px;padding-top:7px;vertical-align:top;"><div style="width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.45);"></div></td><td style="padding-left:10px;font-size:16px;line-height:1.55;color:rgba(255,255,255,0.8);"><strong>uniQure pipeline deployment of $225M:</strong> How quickly uniQure advances its gene therapy programs will test whether investor confidence in the sector is justified or premature.</td></tr></table></td></tr></table></td></tr></table></td></tr><tr><td style="background:#ffffff;padding:24px 32px 30px;"><p style="margin:0 0 16px;font-size:14px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#059669;">🧬 &amp;nbsp;Longevity Companies to Watch</p><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td style="padding:0 0 10px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #e5e5e7;border-left:3px solid #059669;border-radius:10px;"><tr><td style="padding:13px 17px;"><p style="margin:0 0 4px;font-size:18px;font-weight:700;color:#1d1d1f;">uniQure <span style="font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#059669;">Funding</span></p><p style="margin:0;font-size:16px;line-height:1.5;color:#515154;">uniQure priced an upsized $225 million Nasdaq offering, demonstrating that capital is flowing decisively to validated gene therapy platforms even amid broader market volatility.</p></td></tr></table></td></tr><tr><td style="padding:0 0 10px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #e5e5e7;border-left:3px solid #059669;border-radius:10px;"><tr><td style="padding:13px 17px;"><p style="margin:0 0 4px;font-size:18px;font-weight:700;color:#1d1d1f;">Elicio Therapeutics <span style="font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#059669;">Therap px solid #e5e5e7;border-radius:14px;overflow:hidden;"><tr><td style="padding:14px 16px;vertical-align:middle;"><span style="display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:3px 8px;border-radius:20px;background:#fefce8;color:#ca8a04;margin-bottom:8px;">Energy &amp; Compute</span><p style="margin:0;font-size:16px;font-weight:600;letter-spacing:-0.01em;line-height:1.3;color:#1d1d1f;">Amid stark opposition, data center developers think twice about Florida</p><p style="margin:6px 0 0;font-size:14px;color:#aaaaaa;">POLITICO &amp;nbsp;&amp;middot;&amp;nbsp; <a href="https://www.politico.com/news/2026/06/28/florida-data-centers-developers-opposition-00978255" style="color:#ca8a04;font-weight:600;text-decoration:none;">Read &amp;rarr;</a></p></td><td style="padding:0;width:90px;vertical-align:top;line-height:0;font-size:0;"><img src="https://www.politico.com/dims4/default/resize/1200/quality/90/format/jpg?url=https%3A%2F%2Fstatic.politico.com%2Fc9%2F7d%2Fac99fb1f45a7a8ded5bda8cf8b23%2Fmeta-data-center-61267.jpg" width="90" height="90" style="width:100%;height:90px;object-fit:cover;display:block;border-radius:0 13px 13px 0;" /></td></tr></table></td></tr><tr><td style="padding:0;"><table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#422006" style="background-color:#422006;background-image:linear-gradient(135deg,#1c1400 0%,#422006 50%,#713f12 100%);"><tr><td style="padding:26px 32px 16px;border-bottom:1px solid rgba(255,255,255,0.08);"><p style="margin:0 0 4px;font-size:14px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:rgba(255,255,255,0.66);">Energy &amp; Compute &amp;nbsp;&amp;middot;&amp;nbsp; Weekly Analysis</p><p style="margin:0;font-size:19px;font-weight:700;letter-spacing:-0.02em;color:#ffffff;">What this week means for where the grid is headed.</p></td></tr><tr><td style="padding:20px 32px 18px;border-bottom:1px solid rgba(255,255,255,0.08);"><p style="margin:0 0 8px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">What Happened</p><p style="margin:0;font-size:16px;line-height:1.6;color:rgba(255,255,255,0.82);">South Korea opened talks with Samsung and SK Hynix to pull large-scale fab construction forward by more than a decade to 2034-2035. Nvidia-backed Firmus committed to a 360MW Batam campus with 170,000 chips and up to $30 billion in offtake, while Abu Dhabi&#39;s MGX weighs buying Singapore&#39;s DayOne and TensorX raised 8 million euros for Blackwell B300 inference in Dublin and Helsinki.</p><p style="margin:12px 0 0;font-size:16px;line-height:1.65;color:rgba(255,255,255,0.78);">Wall Street is repricing Micron as the AI memory winner.</p></td></tr><tr><td style="padding:20px 32px 18px;border-bottom:1px solid rgba(255,255,255,0.08);"><p style="margin:0 0 8px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">Why It Matters</p><p style="margin:0;font-size:16px;line-height:1.6;color:rgba(255,255,255,0.82);">The constraint on AI is migrating from GPU allocation to high-bandwidth memory and the sovereign capacity to host compute, which is why Micron, Samsung, and SK Hynix now capture pricing power Nvidia once monopolized. National and Gulf capital, from Seoul&#39;s fab acceleration to MGX and TensorX, is buying physical infrastructure to escape dependence on US hyperscalers, even as Florida shows siting is now a community fight, not just a capital one.</p><p style="margin:12px 0 0;font-size:16px;line-height:1.65;color:rgba(255,255,255,0.78);">Expect the next year of margin and scarcity to sit with memory makers and whoever controls land, power, and offtake.</p></td></tr><tr><td style="padding:20px 32px 26px;"><p style="margin:0 0 12px;font-size:13px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.74);">Watch: Next 90 Days</p><table cellpadding="0" cellspacing="0" border="0
