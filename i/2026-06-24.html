ck;margin:0 0 6px 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#c084fc;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">Ars Technica</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">GM installs robots at flagship EV factory after laying off 1,300 workers</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-left:4px solid #7c3aed;margin-bottom:12px;background:#faf8ff;"><tr><td style="padding:16px 18px;"><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7c3aed;font-family:Arial,sans-serif;">What Happened</p><p style="margin:0 0 14px 0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">Hyundai is buying SoftBank&#39;s remaining 9.65% stake in Boston Dynamics for $325 million, making the humanoid robotics firm a wholly owned subsidiary just as its Atlas robot enters production. Sanctuary AI hit a 99.5% success rate on wire-plugging tasks for a Tier 1 automotive supplier, matching factory production speeds. Rainbow Robotics, backed by Samsung, deployed its RB-Y1 humanoid inside a live Coupang warehouse in South Korea, the first commercial trial of its kind. Meanwhile, Ukraine&#39;s Frontline Robotics mounted weapons stations on ground robots to hunt Russian forces, and Anthropic&#39;s Claude Opus 4.7 outperformed human teams in robotics planning tasks.</p><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7c3aed;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">These developments show that humanoid and industrial robots are crossing a critical threshold from lab curiosity to factory floor reality. When robots can plug wires as fast as a trained worker, sort packages in live warehouses, and plan tasks better than human operators, the case for mass deployment becomes harder for companies and workers to ignore. The UAW&#39;s fight at its Constitutional Convention over cobots already running at GM&#39;s Factory ZERO shows that labor and capital are now in direct conflict over who benefits from this shift. How that fight resolves will shape wages, jobs, and the structure of manufacturing for decades.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #7c3aed;border-radius:8px;margin-bottom:12px;background:#f7f4ff;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#7c3aed;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#ffffff;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7c3aed;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#7c3aed;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">1</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sa xt-transform:uppercase;color:#fb923c;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">The New York Times</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">The Tech Sell-off Goes Global</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;"><tr><td><!--[if gte mso 9]><v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:592px;height:300px;"><v:fill type="frame" src="https://gizmodo.com/app/uploads/2026/06/Apollo-15-Composite-Lunar-Lander--1200x675.jpeg" color="#4a1c06" /><v:textbox inset="0,0,0,0"><![endif]--><div><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:592px;border-radius:12px;background-color:#4a1c06;background-image:url(&#39;https://gizmodo.com/app/uploads/2026/06/Apollo-15-Composite-Lunar-Lander--1200x675.jpeg&#39;);background-position:center center;background-size:cover;"><tr><td height="300" valign="bottom" style="height:300px;vertical-align:bottom;"><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td valign="bottom" style="padding:24px 18px 16px;border-radius:0 0 12px 12px;background:linear-gradient(to top, rgba(74,28,6,0.92) 0%, rgba(74,28,6,0.74) 22%, rgba(74,28,6,0.4) 44%, rgba(74,28,6,0) 72%);"><a href="https://gizmodo.com/biologists-want-nasa-to-build-a-quarantine-lab-for-alien-germs-on-the-moon-2000775757" style="text-decoration:none;display:block;"><span style="display:block;margin:0 0 6px 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fb923c;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">Gizmodo</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">Biologists Want NASA to Build a Quarantine Lab for Alien Germs on the Moon</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-left:4px solid #ea580c;margin-bottom:12px;background:#fff8f5;"><tr><td style="padding:16px 18px;"><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ea580c;font-family:Arial,sans-serif;">What Happened</p><p style="margin:0 0 14px 0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">SpaceX went public on June 12 and briefly surpassed Amazon in market cap before losing more than $600 billion in value over three trading days following its first bond sale announcement. Economist Mohamed El-Erian called the collapse wild, noting buyers at the peak are down nearly 25% while IPO-day buyers are still up 23%. Separately, SpaceX tested Starfall, a saucer-shaped reentry vehicle designed to deliver cargo anywhere on Earth from orbit within one hour. Lunar lander company Astrobotic agreed to be acquired by Voyager Technologies to scale up hardware deliveries for NASA&#39;s lunar base initiative, and Firefly Aerospace is set to receive a $110 million U.S. Export-Import Bank loan to expand its spacecraft production facilities in Texas.</p><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ea580c;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">The SpaceX IPO is the largest in U.S. history at $75 billion, and its extreme volatility is forcing serious questions about whether ultra-wealthy founders like Elon Musk can truly share control of companies with public shareholders. Only 4.9% of SpaceX shares are currently available to trade, meaning the stock will remain vulnerable to sharp swings as more shares unlock over the next 14 months. The Starfall program, if successful, could open a new chapter in global logistics, moving time-critical goods like pharmaceuticals and electronics via rocket in under an hour. Meanwhile, government-backed loans to Firefly and India&#39;s decision to share rocket technology with private firms show that governments worldwide are treating commercial space as a strategic priority, not a niche experiment.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #ea580c;border-radius:8px;margin-bottom:12px;background:#fff5f0;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#ea580c;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#ffffff;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ea580c;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#ea580c;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">1</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>S -shadow:0 1px 3px rgba(0,0,0,0.55);">Newsmax</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">US Leads in Biotech Quality, Commercial Reach, but China Is Closing In: Survey</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-left:4px solid #059669;margin-bottom:12px;background:#f6fdf9;"><tr><td style="padding:16px 18px;"><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#059669;font-family:Arial,sans-serif;">What Happened</p><p style="margin:0 0 14px 0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">Legend Biotech released first clinical proof-of-concept data for LB2501, its in vivo CAR-T cell therapy targeting relapsed B-cell lymphoma, presenting results at a major medical conference. Elicio Therapeutics saw its shares collapse roughly 73% after its pancreatic cancer therapy failed a mid-stage study, leaving the company with about $15 million in cash and no clear path forward. Kither Biotech completed a Phase 1 study of its inhaled peptide therapy KIT2014 in 56 healthy participants, reporting strong safety data for COPD and related respiratory diseases. Argentina repealed a regulation restricting biotech patents, with cabinet chief Manuel Adorni announcing the change as part of a push to align the country with international intellectual property standards.</p><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#059669;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">Legend Biotech&#39;s in vivo CAR-T data matters because this approach modifies immune cells inside the body rather than in a lab, which could make the therapy far cheaper and more accessible than traditional CAR-T treatments. Elicio&#39;s collapse is a warning about how brutal the math is for small biotechs: one failed trial can erase most of a company&#39;s value and threaten patients who depend on that research continuing. Argentina&#39;s patent reform opens the door to more biotech investment in Latin America, which could accelerate drug development across a region that has historically lagged in clinical infrastructure. The blood bacteria findings reported this week suggest the human bloodstream plays a more active role in slowing cellular aging than scientists previously understood.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #059669;border-radius:8px;margin-bottom:12px;background:#f0fdf6;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#059669;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#ffffff;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#059669;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#059669;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">1</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>Legend Biotech&#39;s LB2501 follow-up data:</strong> Early proof-of-concept is promising, but larger cohort results will determine whether in vivo CAR-T becomes a viable commercial therapy.</td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#059669;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">2</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>Elicio Therapeutics&#39; strategic review:</strong> With only $15 million in cash and a failed trial, the company must announce a financing or partnership deal quickly or face shutdown, which would affect ongoing patient access.</td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#059669;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">3</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>Argentina&#39;s biotech investment activity:</strong> The patent reform just passed, so watch for foreign biotech companies announcing partnerships or clinical expansions into Argentina as the first real test of the policy&#39;s impact.</td></tr></table></td></tr></table><p style="margin:0 0 10px 0;font- -family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">Newsweek</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">Virginia Becomes Testing Ground for New Data Center Tax</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;"><tr><td><!--[if gte mso 9]><v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:592px;height:300px;"><v:fill type="frame" src="https://media.barchart.com/contributors-admin/common-images/images/People%20%26%20Teaching/A%20concept%20image%20of%20a%20ghost%20businessman%20sitting%20at%20his%20desk%20by%20kinomaster%20via%20Adobe%20Stock.jpeg" color="#4a3608" /><v:textbox inset="0,0,0,0"><![endif]--><div><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:592px;border-radius:12px;background-color:#4a3608;background-image:url(&#39;https://media.barchart.com/contributors-admin/common-images/images/People%20%26%20Teaching/A%20concept%20image%20of%20a%20ghost%20businessman%20sitting%20at%20his%20desk%20by%20kinomaster%20via%20Adobe%20Stock.jpeg&#39;);background-position:center center;background-size:cover;"><tr><td height="300" valign="bottom" style="height:300px;vertical-align:bottom;"><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td valign="bottom" style="padding:24px 18px 16px;border-radius:0 0 12px 12px;background:linear-gradient(to top, rgba(74,54,8,0.92) 0%, rgba(74,54,8,0.74) 22%, rgba(74,54,8,0.4) 44%, rgba(74,54,8,0) 72%);"><a href="https://www.barchart.com/story/news/2600115/this-tiny-ai-memory-stock-is-taking-on-samsung-google-and-nvidia" style="text-decoration:none;display:block;"><span style="display:block;margin:0 0 6px 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#facc15;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">Barchart</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">This Tiny AI Memory Stock Is Taking on Samsung, Google, and Nvidia</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-left:4px solid #eab308;margin-bottom:12px;background:#fffdf0;"><tr><td style="padding:16px 18px;"><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ca8a04;font-family:Arial,sans-serif;">What Happened</p><p style="margin:0 0 14px 0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">Virginia budget negotiators struck a deal this week to tax data center energy use, resolving a contentious fight among Democratic leaders about how to regulate an industry that already consumes 22% of the state&#39;s electricity. The Federal Energy Regulatory Commission unanimously approved new orders to fast-track data center grid connections nationwide. Meta launched a $115 million worker training program called America&#39;s Workforce Academy, targeting data center construction jobs with no experience required. Meanwhile, Foxconn estimated NVIDIA&#39;s Vera Rubin AI datacenter architecture costs $47 billion per gigawatt, with annual power bills alone hitting $1.3 billion.</p><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ca8a04;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">These moves reveal how fast data centers are reshaping American infrastructure and who gets to decide the terms. Virginia&#39;s new tax sets a precedent other states will study closely as data center power demand threatens to crowd out homes, hospitals, and businesses from the grid. The staggering cost figures from Foxconn show that AI infrastructure is now a capital project on the scale of power plants and highways. Workers, ratepayers, and local communities are all being pulled into decisions that were once made quietly in boardrooms.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #eab308;border-radius:8px;margin-bottom:12px;background:#fffef0;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#eab308;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#111111;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ca8a04;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#eab308;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#111111;font-family:Arial,sans-serif;">1</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>Virginia&#39;s data center tax implementation:</strong> The deal is done, but the rate and enforcement de
