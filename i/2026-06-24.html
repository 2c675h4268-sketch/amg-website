:0 0 12px 12px;background:linear-gradient(to top, rgba(54,18,98,0.92) 0%, rgba(54,18,98,0.74) 22%, rgba(54,18,98,0.4) 44%, rgba(54,18,98,0) 72%);"><a href="https://www.benzinga.com/markets/private-markets/26/06/60059817/the-robotics-gold-rush-is-still-accelerating-and-venture-capital-isnt-done-yet" style="text-decoration:none;display:block;"><span style="display:block;margin:0 0 6px 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#c084fc;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">Benzinga</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">The Robotics Gold Rush Is Still Accelerating And Venture Capital Isn&#39;t Done Yet</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-left:4px solid #7c3aed;margin-bottom:12px;background:#faf8ff;"><tr><td style="padding:16px 18px;"><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7c3aed;font-family:Arial,sans-serif;">What Happened</p><p style="margin:0 0 14px 0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">General Motors installed dozens of robot arms at its Detroit EV plant called Factory ZERO while 1,300 workers remain laid off, drawing sharp warnings from the UAW at its Constitutional Convention. Tesla&#39;s Taiwanese suppliers including Mirle and Asia Optical began shipping components for the Optimus 3 humanoid robot as mass production nears. NVIDIA launched Halos for Robotics, a safety platform for deploying autonomous machines alongside humans in factories and warehouses. Commerce Secretary Howard Lutnick privately warned top executives that the US sees China&#39;s state-backed robotics industry as a national security threat.</p><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7c3aed;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">Robotics funding has hit $18.8 billion through mid-2026, already past last year&#39;s full total, and that money is chasing machines that can do physical work humans used to do. When GM replaces workers with arms and Tesla prepares to build humanoid robots at scale, the economic stakes for blue-collar employment become very real and very immediate. Ukraine&#39;s use of weaponized ground robots shows this technology is also reshaping warfare. And Sanctuary AI&#39;s 99.5% success rate on wire-plugging at factory speed proves industrial robots are closing the gap between lab demos and actual production lines.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #7c3aed;border-radius:8px;margin-bottom:12px;background:#f7f4ff;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#7c3aed;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#ffffff;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7c3aed;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background ng:2px;text-transform:uppercase;color:#ea580c;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">The SpaceX IPO implosion is not just a story about one stock. It shapes how much private capital flows into space ventures for the next several years. If the world&#39;s most valuable space company stumbles this badly in public markets, smaller launch firms and satellite startups will find it harder to raise money. Meanwhile, the NASA spaceport warning points to a quieter but serious bottleneck: America cannot keep pace with its own launch ambitions without urgent infrastructure investment, and that delay affects everything from weather satellites to national security.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #ea580c;border-radius:8px;margin-bottom:12px;background:#fff5f0;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#ea580c;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#ffffff;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ea580c;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#ea580c;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;colo size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#34d399;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">Us Weekly</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">What Research Says About Long-Term Sauna Longevity Benefits</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-left:4px solid #059669;margin-bottom:12px;background:#f6fdf9;"><tr><td style="padding:16px 18px;"><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#059669;font-family:Arial,sans-serif;">What Happened</p><p style="margin:0 0 14px 0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">Sangamo Therapeutics filed for Chapter 11 bankruptcy this week, putting its gene therapy and genome-editing assets up for auction with Eli Lilly and Astellas emerging as lead bidders. The FDA and NIH jointly launched Operation Trial Blazer, with acting FDA Commissioner Kyle Diamantas announcing the initiative to cut regulatory friction and speed up early-stage clinical trials. Nvidia executive Kimberly Powell took the stage at the Bio International Convention in San Diego to push agentic AI as the next engine for drug discovery. Meanwhile, uniQure priced an upsized $225 million public offering on Nasdaq to advance its gene therapy pipeline.</p><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#059669;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">These developments collectively reshape who controls the tools of longevity medicine and how fast new therapies can reach patients. Sangamo&#39;s collapse hands powerful genome-editing platforms to large pharma players who have the resources to actually deploy them at scale. Operation Trial Blazer, if it delivers, could shorten the time between a scientific breakthrough and an approved treatment by years. The Nvidia push into biotech means the computing infrastructure behind AI drug discovery is becoming a serious business priority, not an experiment.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #059669;border-radius:8px;margin-bottom:12px;background:#f0fdf6;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#059669;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#ffffff;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#059669;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#059669;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">1</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>The Sangamo auction outcome:</strong> Whichever company wins Eli Lilly or Astellas gains editing tools that could define the next generation of genetic medicine, making this one of the most consequential biotech asset transfers in recent memory.</td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#059669;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">2</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>Operation Trial Blazer&#39;s first concrete steps:</strong> Early implementation details will reveal whether this is a genuine regulatory overhaul or a press release, with real consequences for how fast new longevity drugs move through the pipeline.</td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#059669;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#ffffff;font-family:Arial,sans-serif;">3</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>Nvidia&#39;s agentic AI adoption in drug discovery:</strong> If major biotech firms begin integrating Nvidia&#39;s framework into research workflows, the pace of drug candidate identification could accelerate sharply within months.</td></tr></table></td></tr></table><p style="margin:0 0 10px 0;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#059669;font-family:Arial,sans-serif;">Companies to Watch</p><p style="margin:0 0 28px 0;"><a href="https://atomicmed a-discussing-new-chip-investments-with-samsung-sk-hynix-presidential-2026-06-24/" style="text-decoration:none;display:block;"><span style="display:block;margin:0 0 6px 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#facc15;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">Reuters</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">South Korea&#39;s government discussing major new chip investments with Samsung, SK Hynix</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:16px;"><tr><td><!--[if gte mso 9]><v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:592px;height:300px;"><v:fill type="frame" src="https://www.mlive.com/resizer/v2/ANDBF5A5NJG2LH6QI6WSUH7BNE.JPG?auth=ea81eff6ee74cd4edce4be8f1f82ba4a1b0657bc455a55f20f2fe93f9155dda6&amp;width=1280&amp;smart=true&amp;quality=90" color="#4a3608" /><v:textbox inset="0,0,0,0"><![endif]--><div><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:592px;border-radius:12px;background-color:#4a3608;background-image:url(&#39;https://www.mlive.com/resizer/v2/ANDBF5A5NJG2LH6QI6WSUH7BNE.JPG?auth=ea81eff6ee74cd4edce4be8f1f82ba4a1b0657bc455a55f20f2fe93f9155dda6&amp;width=1280&amp;smart=true&amp;quality=90&#39;);background-position:center center;background-size:cover;"><tr><td height="300" valign="bottom" style="height:300px;vertical-align:bottom;"><table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td valign="bottom" style="padding:24px 18px 16px;border-radius:0 0 12px 12px;background:linear-gradient(to top, rgba(74,54,8,0.92) 0%, rgba(74,54,8,0.74) 22%, rgba(74,54,8,0.4) 44%, rgba(74,54,8,0) 72%);"><a href="https://www.mlive.com/politics/2026/06/lawmakers-michigan-activists-rally-at-capitol-for-statewide-data-center-moratorium.html" style="text-decoration:none;display:block;"><span style="display:block;margin:0 0 6px 0;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#facc15;font-family:Arial,sans-serif;text-shadow:0 1px 3px rgba(0,0,0,0.55);">M Live Michigan</span><span style="display:block;font-size:19px;font-weight:700;color:#ffffff;line-height:1.3;font-family:Arial,sans-serif;text-shadow:0 1px 5px rgba(0,0,0,0.65);">Lawmakers, Michigan activists rally at capitol for statewide data center moratorium</span></a></td></tr></table></td></tr></table></div><!--[if gte mso 9]></v:textbox></v:rect><![endif]--></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-left:4px solid #eab308;margin-bottom:12px;background:#fffdf0;"><tr><td style="padding:16px 18px;"><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ca8a04;font-family:Arial,sans-serif;">What Happened</p><p style="margin:0 0 14px 0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">Virginia struck a deal to impose a new electricity tax on data centers, potentially raising up to $600 million per year, marking a first for the world&#39;s largest data center market. In Michigan, roughly 100 activists and lawmakers rallied at the state Capitol on June 23 demanding a moratorium on new data center construction. Colorado Springs confirmed five formal appeals against the proposed Project Taurus AI data center. Meanwhile, 40 mayors worldwide signed a pact to push for sustainable rules governing how urban data centers are built and operated.</p><p style="margin:0 0 5px 0;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ca8a04;font-family:Arial,sans-serif;">Why It Matters</p><p style="margin:0;font-size:17px;line-height:1.7;color:#1a1a1a;font-family:Arial,sans-serif;">These moves matter because data centers consume enormous and growing amounts of electricity, straining local power grids and driving up costs for regular residents. The Virginia tax is the first serious attempt by a major market to claw back public revenue from an industry that has long received tax breaks while demanding more power infrastructure. If this approach spreads, it could reshape how cities and states negotiate with the tech industry over who pays for grid upgrades and community impact.</p></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="border:1px solid #eab308;border-radius:8px;margin-bottom:12px;background:#fffef0;"><tr><td style="padding:14px 16px;"><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:12px;"><tr><td width="34" style="vertical-align:middle;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:26px;height:26px;background:#eab308;border-radius:6px;text-align:center;vertical-align:middle;"><span style="font-size:14px;color:#111111;font-family:Arial,sans-serif;">&amp;#9201;</span></td></tr></table></td><td style="vertical-align:middle;padding-left:8px;"><span style="font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ca8a04;font-family:Arial,sans-serif;">Watch List: Next 90 Days</span></td></tr></table><table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:8px;"><tr><td width="30" style="vertical-align:top;padding-top:2px;"><table cellpadding="0" cellspacing="0" border="0"><tr><td style="width:22px;height:22px;background:#eab308;border-radius:11px;text-align:center;vertical-align:middle;"><span style="font-size:11px;font-weight:700;color:#111111;font-family:Arial,sans-serif;">1</span></td></tr></table></td><td style="vertical-align:top;padding-left:8px;font-size:16px;line-height:1.6;color:#1a1a1a;font-family:Arial,sans-serif;"><strong>Vi
