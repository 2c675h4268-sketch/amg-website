<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>You're in — The Atomic Five</title>
<meta name="robots" content="noindex">
<style>
  :root{ --black:#1d1d1f; --gray:#6e6e73; --ai-blue:#2563eb; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
    background:#f5f5f7;color:var(--black);display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.5;}
  .card{max-width:480px;width:100%;background:#fff;border-radius:22px;padding:48px 40px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.10);}
  .brand{font-size:14px;font-weight:700;letter-spacing:0.28em;text-transform:uppercase;color:#8ea3cf;margin-bottom:30px;}
  .check{width:72px;height:72px;border-radius:50%;background:#ecfdf5;display:flex;align-items:center;justify-content:center;margin:0 auto 26px;}
  .check svg{width:36px;height:36px}
  h1{font-size:30px;font-weight:800;letter-spacing:-0.02em;margin-bottom:14px;}
  p{font-size:17px;color:#3a3a3c;margin-bottom:10px;}
  .muted{font-size:15px;color:var(--gray);margin-top:20px;}
  .btn{display:inline-block;margin-top:28px;font-size:17px;font-weight:600;color:#fff;background:var(--ai-blue);
    text-decoration:none;padding:14px 34px;border-radius:980px;box-shadow:0 4px 14px rgba(37,99,235,0.35);transition:background .2s;}
  .btn:hover{background:#1d4ed8;}
  .forces{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:26px;}
  .f{font-size:13px;font-weight:600;padding:6px 14px;border-radius:100px;background:#f5f5f7;color:#3a3a3c;}
  .f i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;}
</style></head>
<body>
  <div class="card">
    <div class="brand">The Atomic Five</div>
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>You're confirmed.</h1>
    <p>Your subscription is active. Your first edition lands the next <strong>Monday at 6am</strong>, your time.</p>
    <div class="forces">
      <span class="f"><i style="background:#2563eb"></i>AI</span>
      <span class="f"><i style="background:#7c3aed"></i>Robotics</span>
      <span class="f"><i style="background:#ea580c"></i>Space</span>
      <span class="f"><i style="background:#059669"></i>Longevity</span>
      <span class="f"><i style="background:#ca8a04"></i>Energy &amp; Compute</span>
    </div>
    <a class="btn" href="/">Explore this week's brief</a>
    <p class="muted">Add brief@atomicmediagroup.ai to your contacts so it never lands in spam.</p>
  </div>
  <script>
    (function(){
      var s=new URLSearchParams(location.search).get('status');
      if(!s) return;
      var card=document.querySelector('.card');
      var check=card.querySelector('.check'); var h1=card.querySelector('h1'); var p=card.querySelector('p');
      var forces=card.querySelector('.forces'); var muted=card.querySelector('.muted');
      if(forces) forces.style.display='none';
      check.style.background='#fef2f2';
      check.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:36px;height:36px"><path d="M12 8v5M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>';
      if(s==='invalid'){
        h1.textContent='This link isn’t valid.';
        p.innerHTML='The confirmation link looks incomplete. Please head back and sign up again to get a fresh one.';
      } else {
        h1.textContent='Something went wrong.';
        p.innerHTML='We could not confirm your subscription just now. Please try signing up again, or email brief@atomicmediagroup.ai.';
      }
      if(muted) muted.style.display='none';
    })();
  </script>
</body></html>
